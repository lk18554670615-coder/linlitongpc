name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          - arm64

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify icon assets
        shell: bash
        run: |
          test -f build/icons/icon.icns
          test -f build/icons/icon.png

      - name: Static checks
        run: |
          npm run lint
          npm run smoke

      - name: Build macOS DMG
        run: npx electron-builder --mac dmg --${{ matrix.arch }} --publish never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: linlitong-macos-${{ matrix.arch }}
          path: |
            dist/*-mac-${{ matrix.arch }}.dmg
            dist/*-mac-${{ matrix.arch }}.dmg.blockmap
          if-no-files-found: error
